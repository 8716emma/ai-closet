<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>결제 처리 중... | AI 옷 추천</title>
  <style>
    :root {
      --bg-ivory: #FDFBF7;
      --primary-brown: #6D4C41;
      --text: #3E2723;
    }
    body {
      margin: 0; padding: 0;
      background-color: var(--bg-ivory);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
    .loader {
      border: 4px solid rgba(109, 76, 65, 0.2);
      border-left-color: var(--primary-brown);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    h2 { font-weight: 800; margin-bottom: 8px; }
    p { color: #8d6e63; font-size: 0.95rem; }
  </style>
</head>
<body>
  <div class="loader"></div>
  <h2>결제 정보를 확인하고 있습니다</h2>
  <p>잠시만 기다려주세요...</p>

  <script>
    // URL에서 파라미터 추출
    const urlParams = new URLSearchParams(window.location.search);
    const paymentKey = urlParams.get('paymentKey');
    const orderId = urlParams.get('orderId');
    const amount = urlParams.get('amount');

    // 원래는 서버(백엔드)로 이 정보들을 보내서 검증해야 하지만,
    // 현재는 프론트엔드 포트폴리오용이므로 로컬에서 바로 성공 처리합니다.
    setTimeout(() => {
      if (paymentKey && orderId) {
        // 로컬스토리지에 결제 성공 기록 (CP 지급)
        let currentCredits = parseInt(localStorage.getItem("closet_credits") || "5", 10);
        localStorage.setItem("closet_credits", currentCredits + 10); // 10 CP 추가
        
        // 홈으로 이동하면서 파라미터 전달
        window.location.replace("closet-recommender.html?payment=success");
      } else {
        window.location.replace("payment-fail.html?message=Invalid_Request");
      }
    }, 1500); // 1.5초 로딩 연출
  </script>
</body>
</html>
