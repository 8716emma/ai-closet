<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>결제 실패 | AI 옷 추천</title>
  <style>
    :root {
      --bg-ivory: #FDFBF7;
      --primary-brown: #6D4C41;
      --accent-orange: #d35400;
      --text: #3E2723;
    }
    body {
      margin: 0; padding: 0;
      background-color: var(--bg-ivory);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      text-align: center;
    }
    h2 { font-weight: 800; margin-bottom: 8px; color: var(--accent-orange); }
    p { color: #8d6e63; font-size: 0.95rem; margin-bottom: 24px; }
    .btn {
      background-color: var(--primary-brown);
      color: #fff;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      font-size: 1rem;
    }
    .btn:hover {
      background-color: #5d4037;
    }
  </style>
</head>
<body>
  <h2>결제에 실패했습니다</h2>
  <p id="fail-message">사용자가 결제를 취소했거나 오류가 발생했습니다.</p>
  <a href="closet-recommender.html" class="btn">메인 화면으로 돌아가기</a>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const message = urlParams.get('message');
    if (message) {
      document.getElementById('fail-message').textContent = decodeURIComponent(message);
    }
  </script>
</body>
</html>
